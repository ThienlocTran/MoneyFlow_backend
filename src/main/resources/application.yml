spring:
  config:
    import:
      - optional:file:moneyflow-backend/.env[.properties]
      - optional:file:.env[.properties]
  application:
    name: moneyflow-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:5}
      minimum-idle: ${DB_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:30}
